<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CoinCarriere Immobilier — Recrutez vos agents plus vite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{
    --c-primary:#1E78C8;--c-navy:#0B2E4F;--c-lime:#C4DE00;--c-soft:#EDF5FB;
    --c-ink:#13314e;--c-muted:#5b7488;
    --f-head:'Plus Jakarta Sans',system-ui,sans-serif;
    --f-body:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  body{font-family:var(--f-body);color:var(--c-ink);background:#fff;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  img,svg,video,iframe{display:block;max-width:100%}
  a{text-decoration:none;color:inherit}
  h1,h2,h3,p,blockquote,figure{margin:0}
  button{font-family:inherit}

  /* ---------- Brand ---------- */
  .brand{display:inline-flex;align-items:center}
  .brand-mark{display:grid;place-items:center;background:linear-gradient(150deg,#103a5e,#0a2236);box-shadow:0 4px 10px -3px rgba(11,46,79,.5)}
  .brand-word{display:flex;flex-direction:column;font-family:var(--f-head);font-size:17px}

  /* ---------- CTA ---------- */
  .cta{display:inline-flex;align-items:center;gap:10px;font-family:var(--f-head);font-weight:700;border-radius:999px;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease,filter .2s ease;white-space:nowrap;line-height:1;animation:ctaPulse 1.5s ease-in-out infinite;will-change:transform,box-shadow}
  .cta>span{position:relative;z-index:2}
  .cta:hover{transform:translateY(-2px);animation-play-state:paused}
  @keyframes ctaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
  @keyframes ctaGlowLime{0%,100%{box-shadow:0 8px 22px -8px color-mix(in srgb,var(--c-lime) 70%,transparent),0 0 0 0 color-mix(in srgb,var(--c-lime) 55%,transparent)}50%{box-shadow:0 12px 30px -6px color-mix(in srgb,var(--c-lime) 92%,transparent),0 0 0 9px color-mix(in srgb,var(--c-lime) 26%,transparent)}}
  @keyframes ctaGlowNavy{0%,100%{box-shadow:0 8px 22px -8px color-mix(in srgb,var(--c-primary) 60%,transparent),0 0 0 0 color-mix(in srgb,var(--c-primary) 50%,transparent)}50%{box-shadow:0 12px 30px -6px color-mix(in srgb,var(--c-primary) 88%,transparent),0 0 0 9px color-mix(in srgb,var(--c-primary) 24%,transparent)}}
  @media(prefers-reduced-motion:reduce){.cta{animation:none !important}}
  .cta-ic{flex:none}
  .cta>span,.cta .cta-ic{color:inherit}
  .cta-lime{background:var(--c-lime);color:#0b2e4f;animation:ctaPulse 1.5s ease-in-out infinite,ctaGlowLime 1.5s ease-in-out infinite}
  .cta-lime:hover{filter:brightness(1.06)}
  .cta-navy{background:var(--c-navy);color:#FFFFFF;animation:ctaPulse 1.5s ease-in-out infinite,ctaGlowNavy 1.5s ease-in-out infinite}
  .cta-primary{background:var(--c-primary);color:#FFFFFF;animation:ctaPulse 1.5s ease-in-out infinite,ctaGlowNavy 1.5s ease-in-out infinite}
  .cta-white{background:#fff;color:#0b2e4f;animation:ctaPulse 1.5s ease-in-out infinite,ctaGlowNavy 1.5s ease-in-out infinite}
  .cta-ghost{background:var(--c-navy);color:#FFFFFF;animation:ctaPulse 1.5s ease-in-out infinite,ctaGlowNavy 1.5s ease-in-out infinite}
  .cta-sm{padding:9px 16px;font-size:14px}
  .cta-sm .cta-ic{width:16px;height:16px}
  .cta-md{padding:14px 24px;font-size:16px}
  .cta-lg{padding:18px 30px;font-size:18px}
  .cta-block{display:flex;width:100%;justify-content:center}
  .cta-note{font-size:13.5px;color:var(--c-muted);margin:0}
  .cta-note-light{color:rgba(255,255,255,.92);font-size:14.5px;font-weight:500}

  /* ---------- badge / kicker ---------- */
  .badge{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:999px;font-family:var(--f-head);font-weight:600;font-size:13.5px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;backdrop-filter:blur(6px)}
  .kicker{font-family:var(--f-head);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--c-primary);margin:0}
  .kicker-lime{color:var(--c-lime)}

  /* ---------- lang toggle ---------- */
  .lang-toggle{display:inline-flex;background:color-mix(in srgb,var(--c-navy) 8%,#fff);border-radius:999px;padding:3px}
  .lang-toggle button{border:0;background:transparent;color:var(--c-navy);font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer;opacity:.6}
  .lang-toggle button.on{background:var(--c-primary);color:#fff;opacity:1}

  /* ---------- marquee ---------- */
  .marquee{overflow:hidden;direction:ltr;-webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
  .marquee-track{display:flex;gap:14px;width:max-content;direction:ltr;animation:marq linear infinite}
  .marquee:hover .marquee-track{animation-play-state:paused}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .logo-chip{display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border-radius:12px;background:#fff;border:1px solid rgba(11,46,79,.1);color:var(--c-navy);font-family:var(--f-head);font-weight:700;font-size:15px;white-space:nowrap;box-shadow:0 6px 18px -14px rgba(11,46,79,.6)}
  .logo-chip svg{color:var(--c-primary);opacity:.85}
  .logo-img{height:34px;width:auto;border-radius:8px;object-fit:contain;flex:none}

  /* ---------- media frame ---------- */
  .media-frame{position:relative;width:100%;border-radius:22px;overflow:hidden;background:
    repeating-linear-gradient(135deg,#e8eef5 0 14px,#dfe7f0 14px 28px)}
  .media-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border:0}
  .media-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#6f8198;text-align:center;padding:20px}
  .media-ph-label{font-family:var(--f-head);font-weight:700;font-size:15px;color:#4a6076}
  .media-ph-hint{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.02em;color:#8497a9;max-width:18em}

  /* ---------- stars / person ---------- */
  .stars{display:inline-flex;gap:2px;color:var(--c-lime)}
  .person-ph{flex:none;border-radius:50%;display:grid;place-items:center;color:#8aa0b4;background:color-mix(in srgb,var(--c-primary) 10%,#fff);border:1px solid rgba(11,46,79,.12)}
  .person-photo{flex:none;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid color-mix(in srgb,var(--c-primary) 22%,#fff);box-shadow:0 6px 16px -8px rgba(11,46,79,.5)}

  /* ---------- editable ---------- */
  .ed-on{outline:1.5px dashed color-mix(in srgb,var(--c-primary) 55%,transparent);outline-offset:3px;border-radius:4px;cursor:text;transition:background .15s}
  .ed-on:hover{background:color-mix(in srgb,var(--c-primary) 8%,transparent)}
  .ed-on:focus{outline:2px solid var(--c-primary);background:color-mix(in srgb,var(--c-primary) 6%,transparent)}

  .link-btn{border:0;background:transparent;color:inherit;font:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:3px;opacity:.85}
  .link-btn:hover{opacity:1}

  /* ---------- design switcher (chrome) ---------- */
  .design-switch{position:fixed;bottom:84px;left:16px;z-index:60;display:flex;align-items:center;gap:4px;background:rgba(11,46,79,.92);backdrop-filter:blur(10px);padding:5px 6px 5px 12px;border-radius:999px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5)}
  @media(min-width:760px){.design-switch{bottom:16px}}
  .design-switch .ds-lbl{color:rgba(255,255,255,.65);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-inline-end:4px}
  .design-switch button{border:0;width:30px;height:28px;border-radius:999px;background:transparent;color:rgba(255,255,255,.7);font-weight:800;font-size:13px;cursor:pointer}
  .design-switch button.on{background:var(--c-lime);color:var(--c-navy)}

  .twk-hint{font-size:11px;line-height:1.4;color:rgba(41,38,27,.6);background:rgba(0,0,0,.04);border-radius:8px;padding:8px 10px;margin-top:4px}
  .cta-twk{border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:8px 10px;margin-bottom:8px;background:rgba(0,0,0,.015)}
  .cta-twk-lbl{font-size:12px;font-weight:700;color:#0b2e4f;margin-bottom:4px}

  /* ---------- privacy modal ---------- */
  .pm-overlay{position:fixed;inset:0;z-index:80;background:rgba(11,46,79,.55);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;padding:0}
  .pm{background:#fff;width:100%;max-width:760px;max-height:92vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -20px 60px rgba(0,0,0,.3)}
  .pm-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:24px 24px 16px;border-bottom:1px solid rgba(11,46,79,.1)}
  .pm-hd h2{font-family:var(--f-head);font-weight:800;font-size:22px;color:var(--c-navy)}
  .pm-upd{font-size:13px;color:var(--c-muted);margin-top:4px}
  .pm-x{flex:none;width:34px;height:34px;border-radius:50%;border:0;background:color-mix(in srgb,var(--c-navy) 8%,#fff);color:var(--c-navy);font-size:15px;cursor:pointer}
  .pm-body{overflow-y:auto;padding:20px 24px 36px}
  .pm-sec{margin-bottom:20px}
  .pm-sec h3{font-family:var(--f-head);font-weight:700;font-size:16px;color:var(--c-navy);margin-bottom:8px}
  .pm-sec p{font-size:14px;line-height:1.6;color:#41566b;margin-bottom:8px}
  @media(min-width:640px){
    .pm-overlay{align-items:center;padding:24px}
    .pm{border-radius:22px}
  }
  [dir="rtl"] body,[dir="rtl"] .cta,[dir="rtl"] .brand-word{font-family:'Cairo',var(--f-body)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="privacy.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="design_a.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
